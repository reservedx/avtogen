version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: women_health
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - .env.example
    command: python -m app.workers.main
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    command: npm run dev
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
