services:
  - type: web
    name: avtogen-backend
    runtime: docker
    dockerfilePath: ./infra/backend.Dockerfile
    dockerContext: .
    dockerCommand: bash -lc "cd /app && alembic upgrade head && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: avtogen-db
          property: connectionString
      - key: USE_STUB_GENERATION
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: WORDPRESS_BASE_URL
        sync: false
      - key: WORDPRESS_USERNAME
        sync: false
      - key: WORDPRESS_APP_PASSWORD
        sync: false
      - key: ASSET_STORAGE_BACKEND
        value: local

  - type: web
    name: avtogen-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: API_BASE_HOSTPORT
        fromService:
          type: web
          name: avtogen-backend
          property: hostport

databases:
  - name: avtogen-db
    plan: free
